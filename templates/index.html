<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Expectancy Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>Life Expectancy AI</h1>
            <p>Predict global life expectancy using machine learning.</p>
        </header>

        <form id="prediction-form">
            <div class="input-group">
                <label for="schooling">Schooling (Years)</label>
                <input type="number" id="schooling" step="0.1" placeholder="e.g., 12.5" required>
            </div>
            
            <div class="input-group">
                <label for="income">Income Composition (0-1)</label>
                <input type="number" id="income" step="0.01" min="0" max="1" placeholder="e.g., 0.75" required>
            </div>
            
            <div class="input-group">
                <label for="adultMortality">Adult Mortality (per 1000)</label>
                <input type="number" id="adultMortality" step="1" placeholder="e.g., 150" required>
            </div>
            
            
            <div class="input-group">
                <label for="bmi">Average BMI</label>
                <input type="number" id="bmi" step="0.1" placeholder="e.g., 45.5" required>
            </div>
            
            <div class="input-group">
                <label for="alcohol">Alcohol Consumption (Liters)</label>
                <input type="number" id="alcohol" step="0.01" placeholder="e.g., 5.5" required>
            </div>
            
            <div class="input-group">
                <label for="polio">Polio Immunization (%)</label>
                <input type="number" id="polio" step="1" min="0" max="100" placeholder="e.g., 85" required>
            </div>
            
            <div class="input-group">
                <label for="gdp">GDP (USD)</label>
                <input type="number" id="gdp" step="0.01" placeholder="e.g., 5000" required>
            </div>

            <button type="submit" id="predict-btn">Predict Life Expectancy</button>
        </form>

        <div id="result-container" class="hidden">
            <h2>Predicted Life Expectancy</h2>
            <div class="prediction-value">
                <span id="prediction-text">0.0</span> <span class="years-label">Years</span>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
